services:
  db:
    image: postgres:17.10-bookworm
    environment:
      POSTGRES_DB: titan
      POSTGRES_USER: titan
      POSTGRES_PASSWORD: titan
    volumes:
      - postgres_agent_ci_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - erp_agent_ci_internal

  redis:
    image: redis:7.4.9-alpine
    environment:
      REDIS_PASSWORD: titan-redis
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    volumes:
      - redis_agent_ci_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - erp_agent_ci_internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SECRET_KEY: ci-non-secret-agent-ready-key
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: http://127.0.0.1:8000,http://localhost:8000
      DJANGO_SECURE_SSL_REDIRECT: "0"
      DJANGO_SESSION_COOKIE_SECURE: "0"
      DJANGO_CSRF_COOKIE_SECURE: "0"
      POSTGRES_DB: titan
      POSTGRES_USER: titan
      POSTGRES_PASSWORD: titan
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: titan-redis
    command: python backend/manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; response = urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=2); data = json.loads(response.read().decode()); raise SystemExit(0 if response.status == 200 and data.get('status') == 'ok' else 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    volumes:
      - .:/app
    networks:
      - erp_agent_ci_internal

  frontend-quality:
    image: node:22.14.0-bookworm-slim
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - erp_agent_ci_internal
    command: bash scripts/dev/erp-frontend-quality

volumes:
  postgres_agent_ci_data:
  redis_agent_ci_data:

networks:
  erp_agent_ci_internal:
