name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  classify-changes:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.policy.outputs.backend }}
      frontend: ${{ steps.policy.outputs.frontend }}
      tooling: ${{ steps.policy.outputs.tooling }}
      level: ${{ steps.policy.outputs.level }}
      reason: ${{ steps.policy.outputs.reason }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify changed paths and risk
        id: policy
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          RANGE_MODE: ${{ github.event_name == 'pull_request' && 'pr' || 'push' }}
        run: bash scripts/dev/erp-ci-change-policy --range "$RANGE_MODE" "$BASE_SHA" "$HEAD_SHA"

  backend-quality:
    name: Backend quality
    needs: classify-changes
    if: needs.classify-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: hahitantsoa_titan_erp_ci
          POSTGRES_USER: hahitantsoa_titan_erp_ci
          POSTGRES_PASSWORD: hahitantsoa_titan_erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hahitantsoa_titan_erp_ci -d hahitantsoa_titan_erp_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: hahitantsoa_titan_erp_ci
      POSTGRES_USER: hahitantsoa_titan_erp_ci
      POSTGRES_PASSWORD: hahitantsoa_titan_erp_ci
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run backend quality gate
        run: bash scripts/ci/backend-quality

  frontend-quality:
    name: Frontend quality
    needs: classify-changes
    if: needs.classify-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build

  tooling-quality:
    name: Tooling quality
    needs: classify-changes
    if: needs.classify-changes.outputs.tooling == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate CI policy tooling
        run: |
          bash scripts/dev/test-erp-ci-policy
          bash scripts/dev/test-erp-logged-run

  ci-policy-gate:
    name: CI policy gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - classify-changes
      - backend-quality
      - frontend-quality
      - tooling-quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Verify required checks completed
        env:
          CLASSIFIER_RESULT: ${{ needs.classify-changes.result }}
          BACKEND_REQUIRED: ${{ needs.classify-changes.outputs.backend }}
          BACKEND_RESULT: ${{ needs.backend-quality.result }}
          FRONTEND_REQUIRED: ${{ needs.classify-changes.outputs.frontend }}
          FRONTEND_RESULT: ${{ needs.frontend-quality.result }}
          TOOLING_REQUIRED: ${{ needs.classify-changes.outputs.tooling }}
          TOOLING_RESULT: ${{ needs.tooling-quality.result }}
        run: >-
          bash scripts/dev/erp-ci-policy-gate
          "$CLASSIFIER_RESULT"
          "$BACKEND_REQUIRED"
          "$BACKEND_RESULT"
          "$FRONTEND_REQUIRED"
          "$FRONTEND_RESULT"
          "$TOOLING_REQUIRED"
          "$TOOLING_RESULT"
